name: Bug Report
description: File a bug report
title: "[Bug]: "
labels: ["bug"]
assignees:
  - chivalry
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe what went wrong.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: How can we reproduce it?
      description: Step-by-step instructions to reproduce the issue.
  - type: textarea
    id: anything-else
    attributes:
      label: Anything else we should know?
      description: Screenshots, error messages, additional context.
