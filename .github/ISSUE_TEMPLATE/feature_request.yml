name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
assignees:
  - chivalry
body:
  - type: textarea
    id: problem
    attributes:
      label: What's the problem or need?
      description: Context for the feature request.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
      description: Describe your idea.
    validations:
      required: true
  - type: textarea
    id: anything-else
    attributes:
      label: Anything else?
      description: Examples, mockups, additional context.
